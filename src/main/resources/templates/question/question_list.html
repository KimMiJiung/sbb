<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
	<!-- 검색 -->
	<div class="row my-3">
		<div class="col-6">
			<a class="btn btn-primary" th:href="@{/question/create}">질문 등록하기</a>
		</div>
		
		<div class="col-md-2 position-relative">
			<select class="form-select"  title="검색 유형 선택" id="sw_type" name="sw_type" onchange="getSearchType(this.value)">
		    	<option>전체</option>
				<option value="ques_title" th:selected="${searchType == 'ques_title'}">질문제목</option>
				<option value="ques_content" th:selected="${searchType == 'ques_content'}">질문내용</option>
				<option value="ques_writer" th:selected="${searchType == 'ques_writer'}">질문작성자</option>
				<option value="answ_writer" th:selected="${searchType == 'answ_writer'}">답변작성자</option>
				<option value="answ_content" th:selected="${searchType == 'answ_content'}">답변내용</option>								
		  	</select>
		</div>
		<div class="col-md-4 position-relative">
			<div class="input-group">
				<input type="text" id="search_kw" th:value="${kw}"  class="form-control" placeholder="키워드를 입력해 주세요." title="키워드 입력">
				<input type="button" value="검색" id="btn_search" class="btn btn-outline-primary">					
		  	</div>
		</div>
	</div>
	<table class="table">
		<thead class="table-dark">
			<tr class="text-center">
				<th>번호</th>
				<th style="width: 50%;">제목</th>
				<th>글쓴이</th>
				<th>작성일시</th>
			</tr>
		</thead>
		<!-- 게시물 -->
		<tbody>
			<tr th:each="question, loop : ${paging}" class="text-center">
				<!-- 게시물 번호 -->
				<td th:text="${paging.getTotalElements - (paging.number*paging.size) - loop.index}"></td>
				<td class="text-start">
					<a th:href="@{|/question/detail/${question.id}|}" th:text="${question.subject}"></a>
					<span class="badge bg-warning text-danger small ms-2"
					th:if="${#lists.size(question.answerList) > 0}"  th:text="${#lists.size(question.answerList)}"></span>
				</td>
				<td th:if="${question.author != null}" th:text="${question.author.username}"></td>
				<td th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd a HH:mm')}"></td>
			</tr>
		</tbody>
	</table>
	
	<div class="row my-3">
		<div class="col-6">
			<span th:text="|총 ${paging.totalElements}건|"></span>
		</div>
		<div class="col-6 text-end">
			<span th:text="|${ paging.number+1 } page /  ${paging.totalPages} page|"></span>
		</div>
	</div>	
	
	<!-- 페이징 처리 -->
	<div th:if="${!paging.isEmpty}">
		<ul class="pagination justify-content-center">
			<!-- 처음 페이지 -->
			<li th:classappend="${paging.number==0} ? 'disabled'" class="page-item">
				<a href="javascript:void(0);" th:data-page="${0}" class="page-link" title="처음">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-left-fill" viewBox="0 0 16 16">
					  <path d="m3.86 8.753 5.482 4.796c.646.566 1.658.106 1.658-.753V3.204a1 1 0 0 0-1.659-.753l-5.48 4.796a1 1 0 0 0 0 1.506z"/>
					</svg>
				</a>
			</li>			
			<!-- 이전 페이지 -->
			<li th:classappend="${!paging.hasPrevious} ? 'disabled'" class="page-item">
				<a href="javascript:void(0);" th:data-page="${paging.number - 1}" class="page-link" title="이전">
					<!-- 왼쪽 화살표 -->
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-left" viewBox="0 0 16 16">
					  <path d="M10 12.796V3.204L4.519 8zm-.659.753-5.48-4.796a1 1 0 0 1 0-1.506l5.48-4.796A1 1 0 0 1 11 3.204v9.592a1 1 0 0 1-1.659.753"/>
					</svg>
				</a>
			</li>
			<!-- 페이지 번호 -->			
			<li th:each="page : ${#numbers.sequence(0, paging.totalPages-1)}"
				th:if="${page >= paging.number-5 and page <= paging.number+5}" 
				th:classappend="${page==paging.number} ? 'active'" class="page-item">
				<a th:text="${page+1}"  href="javascript:void(0)" th:data-page="${page}" class="page-link"></a>
			</li>
			<!-- 다음 페이지 -->			
			<li th:classappend="${!paging.hasNext} ? 'disabled'" class="page-item">
				<a href="javascript:void(0);" th:data-page="${paging.number+1}" class="page-link" title="다음">
					<!-- 오른쪽 화살표 -->					
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-right" viewBox="0 0 16 16">
					  <path d="M6 12.796V3.204L11.481 8zm.659.753 5.48-4.796a1 1 0 0 0 0-1.506L6.66 2.451C6.011 1.885 5 2.345 5 3.204v9.592a1 1 0 0 0 1.659.753"/>
					</svg>
				</a>
			</li>
			<!-- 끝 페이지 -->
			<li th:classappend="${paging.number==paging.totalPages-1} ? 'disabled'" class="page-item">
				<a  href="javascript:void(0);" th:data-page="${paging.totalPages-1}" class="page-link" title="끝">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-right-fill" viewBox="0 0 16 16">
					  <path d="m12.14 8.753-5.482 4.796c-.646.566-1.658.106-1.658-.753V3.204a1 1 0 0 1 1.659-.753l5.48 4.796a1 1 0 0 1 0 1.506z"/>
					</svg>
				</a>
			</li>						
		</ul>
	</div>
	<!-- 검색 폼 -->
	<form th:action="@{/question/list}" method="get" id="searchForm">
		<input type="hidden" id="kw" name="kw" th:value="${kw}">
		<input type="hidden" id="searchType" name="searchType" th:value="${searchType}">		
		<input type="hidden" id="page" name="page" th:value="${paging.number}">
	</form>
</div>
<script layout:fragment="script">
		
const page_elements = document.getElementsByClassName("page-link");
Array.from(page_elements).forEach(function(element) {
	element.addEventListener("click", function() {
		document.getElementById("page").value = this.dataset.page;
		document.getElementById("searchForm").submit();		
	});	
});

// 검색 버튼 클릭 이벤트
const btn_search = document.getElementById("btn_search");
btn_search.addEventListener("click", function() {
	document.getElementById("kw").value = document.getElementById("search_kw").value;
	document.getElementById("searchType").value = document.getElementById("sw_type").value;
	document.getElementById("page").value = 0;
	document.getElementById("searchForm").submit();
});
// 검색 상자 엔터 이벤트
const search_kw = document.getElementById("search_kw");
search_kw.addEventListener("keydown", function(e) {
	if (e.keyCode == 13) {
		document.getElementById("kw").value = document.getElementById("search_kw").value;
		document.getElementById("page").value = 0;
		document.getElementById("searchForm").submit();		
	}
});

// 검색 타입 조건값 가져오기
const searchType = document.getElementById('sw_type');
function getSearchType(obj) {
   const selectElement = document.getElementById("sw_type");
   const selectedValue = selectElement.value;
   document.getElementById("searchType").textContent = selectedValue;  
}

	
</script>

</html>
