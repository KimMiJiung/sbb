<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
	<!-- 질문 -->
	<h2 class="border-bottom py-2" th:text="${question.subject}"></h2>
	<div class="card my-3">
		<div class="card-body">
			<div class="card-text" style="white-space: pre-line;" th:text="${question.content}"></div>			
			<div class="d-flex justify-content-end">
				<!-- 수정 날짜와 시간 -->				
				<div th:if="${question.modifyDate != null}" class="badge bg-light text-dark p-2 text-start">
					<div class="mb-2">
						<span>modified</span>
					</div>					
					<div th:text="${#temporals.format(question.modifyDate, 'yyyy-MM-dd a HH:mm')}"></div>
				</div>
				<!-- 등록 날짜와 시간 -->				
				<div class="badge bg-info text-dark p-2 text-start">
					<div class="mb-2">
						<span th:if="${question.author != null}" th:text="${question.author.username}"></span>
					</div>					
					<div th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd a HH:mm')}"></div>
				</div>
			</div>
			
			<!-- 추천, 질문 수정, 삭제 버튼 -->
			<div class="my-3">
				<a href="javascript:void(0);"
					th:data-uri="@{|/question/vote/${question.id}|}" 
					class="vote btn btn-sm btn-outline-info">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-hand-thumbs-up" viewBox="0 0 16 16">
					  <path d="M8.864.046C7.908-.193 7.02.53 6.956 1.466c-.072 1.051-.23 2.016-.428 2.59-.125.36-.479 1.013-1.04 1.639-.557.623-1.282 1.178-2.131 1.41C2.685 7.288 2 7.87 2 8.72v4.001c0 .845.682 1.464 1.448 1.545 1.07.114 1.564.415 2.068.723l.048.03c.272.165.578.348.97.484.397.136.861.217 1.466.217h3.5c.937 0 1.599-.477 1.934-1.064a1.86 1.86 0 0 0 .254-.912c0-.152-.023-.312-.077-.464.201-.263.38-.578.488-.901.11-.33.172-.762.004-1.149.069-.13.12-.269.159-.403.077-.27.113-.568.113-.857 0-.288-.036-.585-.113-.856a2 2 0 0 0-.138-.362 1.9 1.9 0 0 0 .234-1.734c-.206-.592-.682-1.1-1.2-1.272-.847-.282-1.803-.276-2.516-.211a10 10 0 0 0-.443.05 9.4 9.4 0 0 0-.062-4.509A1.38 1.38 0 0 0 9.125.111zM11.5 14.721H8c-.51 0-.863-.069-1.14-.164-.281-.097-.506-.228-.776-.393l-.04-.024c-.555-.339-1.198-.731-2.49-.868-.333-.036-.554-.29-.554-.55V8.72c0-.254.226-.543.62-.65 1.095-.3 1.977-.996 2.614-1.708.635-.71 1.064-1.475 1.238-1.978.243-.7.407-1.768.482-2.85.025-.362.36-.594.667-.518l.262.066c.16.04.258.143.288.255a8.34 8.34 0 0 1-.145 4.725.5.5 0 0 0 .595.644l.003-.001.014-.003.058-.014a9 9 0 0 1 1.036-.157c.663-.06 1.457-.054 2.11.164.175.058.45.3.57.65.107.308.087.67-.266 1.022l-.353.353.353.354c.043.043.105.141.154.315.048.167.075.37.075.581 0 .212-.027.414-.075.582-.05.174-.111.272-.154.315l-.353.353.353.354c.047.047.109.177.005.488a2.2 2.2 0 0 1-.505.805l-.353.353.353.354c.006.005.041.05.041.17a.9.9 0 0 1-.121.416c-.165.288-.503.56-1.066.56z"/>
					</svg>
					<span class="badge bg-success rounded-pill" th:text="${#lists.size(question.voter)}"></span>
				</a>									
				<a th:href="@{|/question/modify/${question.id}|}" 
					sec:authorize="isAuthenticated()"
					th:if="${question.author != null and question.author.username == #authentication.getPrincipal().getUsername()}"
					class="btn btn-sm btn-outline-warning" th:text="수정"></a>
				<a href="javascript:void(0);"
					th:data-uri="@{|/question/delete/${question.id}|}" 
					sec:authorize="isAuthenticated()"
					th:if="${question.author != null and question.author.username == #authentication.getPrincipal().getUsername()}"
					class="delete btn btn-sm btn-outline-danger" th:text="삭제"></a>					
			</div>
			<!-- 질문 댓글 Start -->
			<div class="mt-3" th:if="${not #lists.isEmpty(question.commentList)}">
				<div class="comment py-2 text-muted">
					<!-- 댓글 건수 -->
					<span class="border-bottom my-3 py-2 small" th:text="|댓글 : ${#lists.size(question.commentList)} 건|"></span>
					<table class="table table-bordered table-sm">
						<thead class="table-light">
							<tr>
								<th scope="col" class="small">댓글내용</th>
								<th scope="col" class="small">작성자</th>
								<th scope="col" class="small">등록일/수정일</th>
								<th>#</th>
							</tr>							
						</thead>
						<tbody th:each="comment, index : ${question.commentList}">
							<tr>
								<td style="font-size: small;" th:text="${comment.content}"></td>
								<td th:text="${comment.author.username}"></td>
								<td style="font-size: small;">
									<!-- 등록일 / 수정일 출력 -->
									<div th:text="| 등록일: ${#temporals.format(comment.createDate, 'yyyy-MM-dd HH:mm')} |"></div>
									<div th:if="${comment.modifyDate != null}" th:text="| 수정일: ${#temporals.format(comment.modifyDate, 'yyyy-MM-dd HH:mm')} |"></div>
								</td>
								<td style="font-size: small;">
									<a th:href="@{|/comment/modify/${comment.id}|}" 
									   sec:authorize="isAuthenticated()"
									   th:if="${comment.author != null and comment.author.username == #authentication.getPrincipal().getUsername()}"
									   class="small btn btn-sm btn-outline-info">수정</a>
									<a href="javascript:void(0);" 
									   sec:authorize="isAuthenticated()"
									   th:if="${comment.author != null and comment.author.username == #authentication.getPrincipal().getUsername()}"
									   class="small delete btn btn-sm btn-outline-danger" 
									   th:data-uri="@{|/comment/delete/${comment.id}|}">삭제</a>
								</td>								
							</tr>
						</tbody>						
					</table>
			        </div>
			    </div>
			    <div>
			        <a th:href="@{|/comment/create/question/${question.id}|}" class="small"><small>댓글 추가</small></a>
			    </div>
			    <!-- 질문 댓글 End -->								
		</div>	
	</div>
	
	<!-- 답변 개수 -->
	<h5 class="border-bottom my-3 py-2" th:text="|${#lists.size(question.answerList)}개의 답변이 있습니다.|"></h5>



	<!-- 답변 목록 -->	
	<div class="card my-3" th:each="answer, loop : ${paging.content}">
		<a th:id="|answer_${answer.id}|"></a>
		<div class="card-body">
			<div class="card-text" style="white-space: pre-line;" th:text="${answer.content}"></div>	
			<div class="d-flex justify-content-end">
				<!-- 답변 수정 날짜와 시간 -->
				<div th:if="${answer.modifyDate != null}"  class="badge bg-light text-dark p-2 text-start">
					<div class="mb-2">
						<span>modified</span>
					</div>
					<div th:text="${#temporals.format(answer.modifyDate, 'yyyy-MM-dd a HH:mm')}"></div>
				</div>
				<!-- 답변 등록 날짜와 시간 -->				
				<div class="badge bg-warning text-dark p-2 text-start">
					<div class="mb-2">
						<span th:if="${answer.author != null}" th:text="${answer.author.username}"></span>
					</div>
					<div th:text="${#temporals.format(answer.createDate, 'yyyy-MM-dd a HH:mm')}"></div>
				</div>
			</div>
			<!-- 추천 답변 수정, 삭제 -->
			<div class="my-3">
				<a href="javascript:void(0);"
				    th:data-uri="@{|/answer/vote/${answer.id}|}"
					class="vote btn btn-sm btn-outline-secondary">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-hand-thumbs-up" viewBox="0 0 16 16">
					  <path d="M8.864.046C7.908-.193 7.02.53 6.956 1.466c-.072 1.051-.23 2.016-.428 2.59-.125.36-.479 1.013-1.04 1.639-.557.623-1.282 1.178-2.131 1.41C2.685 7.288 2 7.87 2 8.72v4.001c0 .845.682 1.464 1.448 1.545 1.07.114 1.564.415 2.068.723l.048.03c.272.165.578.348.97.484.397.136.861.217 1.466.217h3.5c.937 0 1.599-.477 1.934-1.064a1.86 1.86 0 0 0 .254-.912c0-.152-.023-.312-.077-.464.201-.263.38-.578.488-.901.11-.33.172-.762.004-1.149.069-.13.12-.269.159-.403.077-.27.113-.568.113-.857 0-.288-.036-.585-.113-.856a2 2 0 0 0-.138-.362 1.9 1.9 0 0 0 .234-1.734c-.206-.592-.682-1.1-1.2-1.272-.847-.282-1.803-.276-2.516-.211a10 10 0 0 0-.443.05 9.4 9.4 0 0 0-.062-4.509A1.38 1.38 0 0 0 9.125.111zM11.5 14.721H8c-.51 0-.863-.069-1.14-.164-.281-.097-.506-.228-.776-.393l-.04-.024c-.555-.339-1.198-.731-2.49-.868-.333-.036-.554-.29-.554-.55V8.72c0-.254.226-.543.62-.65 1.095-.3 1.977-.996 2.614-1.708.635-.71 1.064-1.475 1.238-1.978.243-.7.407-1.768.482-2.85.025-.362.36-.594.667-.518l.262.066c.16.04.258.143.288.255a8.34 8.34 0 0 1-.145 4.725.5.5 0 0 0 .595.644l.003-.001.014-.003.058-.014a9 9 0 0 1 1.036-.157c.663-.06 1.457-.054 2.11.164.175.058.45.3.57.65.107.308.087.67-.266 1.022l-.353.353.353.354c.043.043.105.141.154.315.048.167.075.37.075.581 0 .212-.027.414-.075.582-.05.174-.111.272-.154.315l-.353.353.353.354c.047.047.109.177.005.488a2.2 2.2 0 0 1-.505.805l-.353.353.353.354c.006.005.041.05.041.17a.9.9 0 0 1-.121.416c-.165.288-.503.56-1.066.56z"/>
					</svg>
					<span class="badge bg-success rounded-pill"   th:text="${#lists.size(answer.voter)}"></span>
				</a>								
				<a th:href="@{|/answer/modify/${answer.id}|}"
					class="btn btn-sm btn-outline-info"
					sec:authorize="isAuthenticated()"
					th:if="${answer.author != null and answer.author.username == #authentication.getPrincipal().getUsername()}"
					th:text="수정"></a>
				<a href="javascript:void(0);"
					th:data-uri="@{|/answer/delete/${answer.id}|}"
					class="delete btn btn-sm btn-outline-danger"
					sec:authorize="isAuthenticated()"
					th:if="${answer.author != null and answer.author.username == #authentication.getPrincipal().getUsername()}"
					th:text="삭제">	
				</a>				
			</div>
			<!-- 질문 댓글 Start -->
			<div class="mt-3" th:if="${not #lists.isEmpty(answer.commentList)}">
				<div class="comment py-2 text-muted">
					<!-- 댓글 건수 -->
					<span class="border-bottom my-3 py-2 small" th:text="|댓글 : ${#lists.size(question.commentList)} 건|"></span>
					<table class="table table-bordered table-sm">
						<thead class="table-light">
							<tr>
								<th scope="col" class="small">댓글내용</th>
								<th scope="col" class="small">작성자</th>
								<th scope="col" class="small">등록일/수정일</th>
								<th>#</th>
							</tr>							
						</thead>
						<tbody th:each="comment, index : ${answer.commentList}">
							<tr>
								<td style="font-size: small;" th:text="${comment.content}"></td>
								<td th:text="${comment.author.username}"></td>
								<td style="font-size: small;">
									<!-- 등록일 / 수정일 출력 -->
									<div th:text="| 등록일: ${#temporals.format(comment.createDate, 'yyyy-MM-dd HH:mm')} |"></div>
									<div th:if="${comment.modifyDate != null}" th:text="| 수정일: ${#temporals.format(comment.modifyDate, 'yyyy-MM-dd HH:mm')} |"></div>
								</td>
								<td style="font-size: small;">
									<a th:href="@{|/comment/modify/${comment.id}|}" 
									   sec:authorize="isAuthenticated()"
									   th:if="${comment.author != null and comment.author.username == #authentication.getPrincipal().getUsername()}"
									   class="small btn btn-sm btn-outline-info">수정</a>
									<a href="javascript:void(0);" 
									   sec:authorize="isAuthenticated()"
									   th:if="${comment.author != null and comment.author.username == #authentication.getPrincipal().getUsername()}"
									   class="small delete btn btn-sm btn-outline-danger" 
									   th:data-uri="@{|/comment/delete/${comment.id}|}">삭제</a>
								</td>								
							</tr>
						</tbody>						
					</table>
			        </div>
			    </div>
			    <div>
			        <a th:href="@{|/comment/create/answer/${answer.id}|}" class="small"><small>댓글 추가</small></a>
			    </div>
			    <!-- 질문 댓글 End -->									
		</div>
	</div>
	
	<!-- 답변 작성 폼 -->		
	<form class="my-2" th:action="@{|/answer/create/${question.id}|}" method="post" th:object="${answerForm}">
		<!-- 유효성 검증 에러 -->
		<div th:replace="~{form_errors :: formErrorsFragment}"></div>
		<textarea sec:authorize="isAnonymous()" disabled class="form-control" name="content" id="content" rows="8" th:field="*{content}"></textarea>
		<textarea sec:authorize="isAuthenticated()" class="form-control" name="content" id="content" rows="8" th:field="*{content}"></textarea>		
		<input class="btn btn-primary my-2" type="submit" value="답변 등록">
	</form>	
		
	<!-- 페이징 처리 -->
	<div th:if="${!paging.isEmpty}">
		<ul class="pagination justify-content-center">
			<!-- 처음 페이지 -->
			<li th:classappend="${paging.number==0} ? 'disabled'" class="page-item">
				<a href="javascript:void(0);" th:data-page="${0}" class="page-link" title="처음">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-left-fill" viewBox="0 0 16 16">
					  <path d="m3.86 8.753 5.482 4.796c.646.566 1.658.106 1.658-.753V3.204a1 1 0 0 0-1.659-.753l-5.48 4.796a1 1 0 0 0 0 1.506z"/>
					</svg>
				</a>
			</li>			
			<!-- 이전 페이지 -->
			<li th:classappend="${!paging.hasPrevious} ? 'disabled'" class="page-item">
				<a href="javascript:void(0);" th:data-page="${paging.number - 1}" class="page-link" title="이전">
					<!-- 왼쪽 화살표 -->
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-left" viewBox="0 0 16 16">
					  <path d="M10 12.796V3.204L4.519 8zm-.659.753-5.48-4.796a1 1 0 0 1 0-1.506l5.48-4.796A1 1 0 0 1 11 3.204v9.592a1 1 0 0 1-1.659.753"/>
					</svg>
				</a>
			</li>
			<!-- 페이지 번호 -->			
			<li th:each="page : ${#numbers.sequence(0, paging.totalPages-1)}"
				th:if="${page >= paging.number-5 and page <= paging.number+5}" 
				th:classappend="${page==paging.number} ? 'active'" class="page-item">
				<a th:text="${page+1}"  href="javascript:void(0)" th:data-page="${page}" class="page-link"></a>
			</li>
			<!-- 다음 페이지 -->			
			<li th:classappend="${!paging.hasNext} ? 'disabled'" class="page-item">
				<a href="javascript:void(0);" th:data-page="${paging.number+1}" class="page-link" title="다음">
					<!-- 오른쪽 화살표 -->					
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-right" viewBox="0 0 16 16">
					  <path d="M6 12.796V3.204L11.481 8zm.659.753 5.48-4.796a1 1 0 0 0 0-1.506L6.66 2.451C6.011 1.885 5 2.345 5 3.204v9.592a1 1 0 0 0 1.659.753"/>
					</svg>
				</a>
			</li>
			<!-- 끝 페이지 -->
			<li th:classappend="${paging.number==paging.totalPages-1} ? 'disabled'" class="page-item">
				<a  href="javascript:void(0);" th:data-page="${paging.totalPages-1}" class="page-link" title="끝">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-caret-right-fill" viewBox="0 0 16 16">
					  <path d="m12.14 8.753-5.482 4.796c-.646.566-1.658.106-1.658-.753V3.204a1 1 0 0 1 1.659-.753l5.48 4.796a1 1 0 0 1 0 1.506z"/>
					</svg>
				</a>
			</li>						
		</ul>
	</div>
	
	<div class="row my-3">
		<div class="col-6">
			<span th:text="|총 ${paging.totalElements}건|"></span>
		</div>
		<div class="col-6 text-end">
			<span th:text="|${ paging.number+1 } page / ${paging.totalPages} page|"></span>
		</div>
	</div>		
	
	<form th:action="@{|/question/detail/${question.id}|}" method="get" id="answerForm">
		<input type="hidden" id="page" name="page" th:value="${paging.number}">
	</form>
</div>
<script layout:fragment="script">
	
	const page_elements = document.getElementsByClassName("page-link");
	Array.from(page_elements).forEach(function(element) {
		element.addEventListener("click", function() {
			document.getElementById("page").value = this.dataset.page;
			document.getElementById("answerForm").submit();		
		});	
	});
	
	// 삭제 버튼 클릭 이벤트
	const delete_elements = document.getElementsByClassName("delete");
	Array.from(delete_elements).forEach(function(element) {
		element.addEventListener("click", function() {
			if (confirm("정말 삭제하겠습니까?")) {
				location.href = this.dataset.uri;
			}
		})
	})	
	// 추천 버튼 클릭 이벤트
	const vote_elements = document.getElementsByClassName("vote");
	Array.from(vote_elements).forEach(function(element) {
		element.addEventListener("click", function() {
			location.href = this.dataset.uri;
		})
	})
	
</script>








</html>
