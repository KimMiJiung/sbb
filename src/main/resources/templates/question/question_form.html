<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container">
	<h5 th:if="${questionForm.subject == null}" class="my-3 border-bottom pb-2">질문 등록</h5>
	<h5 th:if="${questionForm.subject != null}" class="my-3 border-bottom pb-2 text-primary">질문 수정</h5>
	<!-- form에서 th:action을 삭제하면 요청 URL의 경로로 이동함 -->
	<!-- form에서 th:action을 삭제하면 CSRF값이 사라지므로 직접 적어주어야 함 -->
	<form method="post" th:object="${questionForm}">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<!-- 유효성 검증 에러 메세지 출력 -->
		<div th:replace="~{form_errors :: formErrorsFragment}"></div>
		
		<div class="mb-3">
			<label class="form-label" for="subject">제목</label>
			<input class="form-control" type="text" name="subject" id="subject" th:field="*{subject}">
		</div>
		<div class="mb-3">
			<label class="form-label" for="content">내용</label>
			<textarea class="form-control" name="content" id="content" rows="10" th:field="*{content}"></textarea>
		</div>
		<input th:if="${questionForm.subject == null}"  class="btn btn-primary my-2" type="submit" value="저장하기">
		<input th:if="${questionForm.subject != null}"  class="btn btn-success my-2" type="submit" value="수정하기">
	</form>
</div>
</html>
