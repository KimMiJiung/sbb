<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
	<div>
		<div><h4>회원 가입</h4></div>
	</div>
	<form th:action="@{/user/signup}" method="post" th:object="${siteUserForm}">
		<!-- 유효성 검증 에러 메세지 출력 -->
		<div th:replace="~{form_errors :: formErrorsFragment}"></div>
		<div class="mb-3">
			<label for="username" class="form-label">사용자 ID</label>
			<input type="text" name="username" id="username" th:field="*{username}" class="form-control">
		</div>
		<div class="mb-3">
			<label for="password1" class="form-label">비밀번호</label>
			<input type="password" name="password1" id="password1" th:field="*{password1}" class="form-control">
		</div>
		<div class="mb-3">
			<label for="password2" class="form-label">비밀번호 확인</label>
			<input type="password" name="password2" id="password2" th:field="*{password2}" class="form-control">
		</div>
		<div class="mb-3">
			<label for="email" class="form-label">이메일</label>
			<input type="email" name="email" id="email" th:field="*{email}" class="form-control">
		</div>
		<input type="submit" value="회원가입" class="btn btn-primary">		
	</form>
</div>
</html>
